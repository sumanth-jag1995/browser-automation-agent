services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      USE_MOCK_LLM: "true"
      PLAYWRIGHT_HEADLESS: "true"
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./screenshots:/app/screenshots
      - ./reports:/app/reports
      - ./scripts:/app/scripts
